openapi: 3.0.0
info:
  title: Fuel Pre-Order API
  description: API for fuel pre-order and pickup mobile application
  version: 1.0.0
  contact:
    name: Fuel App Team
    email: support@fuelapp.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.fuelapp.com/api
    description: Production server

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        200:
          description: User data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'

  /stations/nearby:
    get:
      tags:
        - Stations
      summary: Find nearby fuel stations
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: float
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: float
        - name: radius
          in: query
          schema:
            type: number
            default: 10
        - name: fuelType
          in: query
          schema:
            type: string
            enum: [gasoline, diesel, electric, lpg, cng, premium_gasoline, premium_diesel]
        - name: brand
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: Nearby stations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      stations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Station'
                      count:
                        type: integer

  /stations/{id}:
    get:
      tags:
        - Stations
      summary: Get station details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Station details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      station:
                        $ref: '#/components/schemas/Station'

  /orders:
    post:
      tags:
        - Orders
      summary: Create new fuel order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - stationId
                - fuelType
                - quantity
                - scheduledTime
              properties:
                stationId:
                  type: string
                fuelType:
                  type: string
                  enum: [gasoline, diesel, electric, lpg, cng, premium_gasoline, premium_diesel]
                quantity:
                  type: number
                unit:
                  type: string
                  enum: [liters, gallons, kWh]
                  default: liters
                scheduledTime:
                  type: string
                  format: date-time
                vehicle:
                  type: object
                addOns:
                  type: array
                  items:
                    type: object
      responses:
        201:
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      order:
                        $ref: '#/components/schemas/Order'

    get:
      tags:
        - Orders
      summary: Get user orders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, in_progress, completed, cancelled, expired]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
      responses:
        200:
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      orders:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          limit:
                            type: integer
                          skip:
                            type: integer
                          hasMore:
                            type: boolean

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get order details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Order details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      order:
                        $ref: '#/components/schemas/Order'

  /orders/{id}/cancel:
    put:
      tags:
        - Orders
      summary: Cancel order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        200:
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      order:
                        $ref: '#/components/schemas/Order'

  /payments/create-payment-intent:
    post:
      tags:
        - Payments
      summary: Create Stripe payment intent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: string
                paymentMethodId:
                  type: string
      responses:
        200:
          description: Payment intent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      clientSecret:
                        type: string
                      paymentIntentId:
                        type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        loyaltyPoints:
          type: number
        loyaltyTier:
          type: string
          enum: [bronze, silver, gold, platinum]
        preferences:
          type: object
          properties:
            language:
              type: string
              enum: [en, es, fr, ar, zh]
            currency:
              type: string
            units:
              type: string
              enum: [metric, imperial]
            notifications:
              type: object
              properties:
                email:
                  type: boolean
                push:
                  type: boolean
                sms:
                  type: boolean

    Station:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brand:
          type: string
        address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            postalCode:
              type: string
            coordinates:
              type: object
              properties:
                latitude:
                  type: number
                longitude:
                  type: number
        fuelTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              price:
                type: number
              currency:
                type: string
              isAvailable:
                type: boolean
        rating:
          type: object
          properties:
            average:
              type: number
            count:
              type: number
        isOpen:
          type: boolean
        distance:
          type: number

    Order:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        user:
          type: string
        station:
          type: string
        fuelType:
          type: string
        quantity:
          type: number
        unit:
          type: string
        pricing:
          type: object
          properties:
            basePrice:
              type: number
            fuelPrice:
              type: number
            tax:
              type: number
            serviceFee:
              type: number
            totalAmount:
              type: number
            currency:
              type: string
        pickup:
          type: object
          properties:
            scheduledTime:
              type: string
              format: date-time
            actualTime:
              type: string
              format: date-time
            status:
              type: string
            qrCode:
              type: string
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, in_progress, completed, cancelled, expired]
        createdAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
